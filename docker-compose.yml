services:
  icedata-web-react:
    image: ${ICEDATA_WEB_IMAGE:-ghcr.io/icedata-top/icedata-web-react:main}
    environment:
      ICEDATA_API_BASE_URL: /api
      ICEDATA_API_UPSTREAM: http://icedata-backend:8080
    ports:
      - "5173:80"
    depends_on:
      - icedata-backend
    restart: unless-stopped

  icedata-backend:
    image: ${ICEDATA_BACKEND_IMAGE:-ghcr.io/icedata-top/hantang-web-backend:main}
    volumes:
      - ${ICEDATA_BACKEND_CONFIG_SECRET:?Set ICEDATA_BACKEND_CONFIG_SECRET to the backend config.secret.properties path}:/app/config.secret.properties:ro
    expose:
      - "8080"
    restart: unless-stopped
