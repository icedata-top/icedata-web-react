name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Build React app and Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_APP_ENV: PROD

      - name: Build Docker image
        run: docker build --build-arg VITE_APP_ENV=PROD --tag icedata-web-react:ci .
